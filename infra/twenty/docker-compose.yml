services:
  twenty:
    image: twentycrm/twenty:latest
    ports:
      - "3000:3000"
    environment:
      SERVER_URL: http://localhost:3000
      REDIS_URL: redis://redis:6379
      PG_DATABASE_URL: postgres://twenty:twenty@db:5432/twenty
      STORAGE_TYPE: local
      ACCESS_TOKEN_SECRET: local-access-secret-change-in-prod
      LOGIN_TOKEN_SECRET: local-login-secret-change-in-prod
      REFRESH_TOKEN_SECRET: local-refresh-secret-change-in-prod
      FILE_TOKEN_SECRET: local-file-secret-change-in-prod
      ENCRYPTION_KEY: s7nRaqIKYHQgV9EL0bvXl3jmA5wcFCMG
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - twenty-server-local-data:/app/packages/twenty-server/.local-storage
    restart: unless-stopped

  twenty-worker:
    image: twentycrm/twenty:latest
    command: ["node", "packages/twenty-server/dist/src/queue-worker/queue-worker.js"]
    environment:
      SERVER_URL: http://localhost:3000
      REDIS_URL: redis://redis:6379
      PG_DATABASE_URL: postgres://twenty:twenty@db:5432/twenty
      STORAGE_TYPE: local
      ACCESS_TOKEN_SECRET: local-access-secret-change-in-prod
      LOGIN_TOKEN_SECRET: local-login-secret-change-in-prod
      REFRESH_TOKEN_SECRET: local-refresh-secret-change-in-prod
      FILE_TOKEN_SECRET: local-file-secret-change-in-prod
      ENCRYPTION_KEY: s7nRaqIKYHQgV9EL0bvXl3jmA5wcFCMG
    depends_on:
      - twenty
      - db
      - redis
    volumes:
      - twenty-server-local-data:/app/packages/twenty-server/.local-storage
    restart: unless-stopped

  db:
    image: postgres:16
    environment:
      POSTGRES_USER: twenty
      POSTGRES_PASSWORD: twenty
      POSTGRES_DB: twenty
    volumes:
      - twenty-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U twenty"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:7
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

volumes:
  twenty-postgres-data:
  twenty-server-local-data:
